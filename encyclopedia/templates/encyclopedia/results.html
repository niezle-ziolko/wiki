{% extends "encyclopedia/layout.html" %}

{% block title %}
    Encyclopedia
{% endblock %}

{% block body %}
<div class="title">
    <h1>Search Results</h1>
</div>

{% if results|length > 0 %}
<ul>
    {% for page in results %}
    <li><a href="/{{ page }}">{{ page }}</a></li>
    {% endfor %}
</ul>
{% else %}
    <p>No results found. Click <a href="/"> here</a> to go back.</p>
{% endif %}
{% endblock %}
